name: Daily Sentiment Refresh

on:
  schedule:
    # Runs at 9:45 AM ET every weekday (13:45 UTC)
    - cron: '45 13 * * 1-5'
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push updated CSV back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run daily refresh
        env:
          AV_API_KEY: ${{ secrets.AV_API_KEY }}
        run: |
          python daily_refresh.py --api_key $AV_API_KEY

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live_predictions.csv
          git diff --staged --quiet || git commit -m "Daily refresh $(date -u '+%Y-%m-%d')"
          git push
